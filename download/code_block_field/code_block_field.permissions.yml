'use code block field inline editor':
  title: 'Использовать инлайн-редактор для полей Code Block'
  description: 'Позволяет редактировать содержимое HTML/CSS/JS полей Code Block прямо на странице без открытия формы сущности. Включает загрузку изображений и редактирование ссылок. Пользователь также должен иметь право «update» на сущности.'
  restrict access: true

'administer code block field':
  title: 'Администрировать настройки Code Block Field'
  description: 'Доступ к глобальным настройкам модуля (фильтр HTML, путь загрузки, цвета редактора и т.д.).'
  restrict access: true

'edit code block html directly':
  title: 'Редактировать HTML-код в полях Code Block напрямую'
  description: 'Если выключено — пользователь может менять только текст/изображения/ссылки через инлайн-редактор, но не может изменять структуру (HTML-код) блока через форму сущности.'
  restrict access: false
