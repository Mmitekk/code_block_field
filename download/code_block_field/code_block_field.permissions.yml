'use code block field inline editor':
  title: 'Use inline editor for Code Block fields'
  description: 'Allows editing HTML/CSS/JS content of Code Block fields directly on the page without opening the entity edit form. Includes uploading images and editing links.'
  restrict access: true

'administer code block field':
  title: 'Administer Code Block Field settings'
  description: 'Configure global settings for Code Block Field module (filter settings, default editor, etc.).'
  restrict access: true

'edit code block html directly':
  title: 'Edit raw HTML in Code Block fields'
  description: 'When disabled, the user can only change text/images/links through the inline editor, but cannot modify the structure (HTML code) of the block through the entity edit form.'
  restrict access: false
